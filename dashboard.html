<!DOCTYPE html>
<html lang="en">
<head>

    <title>Dashboard - SRM HRMS</title>

<body>
    <aside class="sidebar">
       <div class="sidebar-logo">

        <nav>
            <a href="dashboard.html" class="nav-link active"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="rooms.html" class="nav-link"><i class="fas fa-bed"></i> Manage Rooms</a>

            <div class="stat-card" style="border-color: #6366f1;"><h3>Occupied</h3><div style="font-size: 28px; font-weight: 700;">1,124</div></div>

        </div>

        <div class="table-container">
            <h3>Recent Activity</h3>
            <table>
                <thead><tr><th>Hostel</th><th>Room</th><th>Student ID</th><th>Action</th></tr></thead>

                    <tr><td>Adhiyaman</td><td>A-202</td><td>RA231100</td><td>Check-in</td></tr>
